[pytest]
DJANGO_SETTINGS_MODULE = location_app.settings
python_files = tests.py test_*.py *_tests.py
testpaths = biens comptabilite notification utilisateur
addopts = 
    --strict-markers
    --disable-warnings
    -v
    --tb=short
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    unit: marks tests as unit tests

[coverage:run]
omit =
    */venv/*
    */migrations/*
    */site-packages/*
    manage.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
